name: Cypress E2E Tests

on:
  push:
    branches: [dev, stage, prod]
  pull_request:
    branches: [dev, stage, prod]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@v3

      - name: Use Node.js v20
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Clone Backend Repository
        run: |
          git clone https://x-access-token:${{ secrets.BACKEND_PAT }}@github.com/kb21-rw/experience-rwanda-backend.git backend

      - name: Install Backend Dependencies
        working-directory: backend
        run: yarn

      - name: Start Backend Server on port 4000
        working-directory: backend
        run: PORT=4000 yarn dev &
      
      - name: Wait for Backend to Start
        run: |
          echo "Waiting for backend..."
          until curl -sSf http://localhost:4000/api/health; do
            sleep 2
          done

      - name: Start Frontend Server
        run: npm run dev &

      - name: Wait for Frontend to Start
        run: |
          echo "Waiting for frontend..."
          until curl -sSf http://localhost:3000; do
            sleep 2
          done

      - name: Run Cypress Tests
        run: npx cypress run

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
