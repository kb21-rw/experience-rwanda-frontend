name: Cypress E2E Workflow
on:
  push:
    branches:
      - dev
      - stage
      - prod
  pull_request:
    branches:
      - dev
      - stage
      - prod
jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Backend
        uses: actions/checkout@v2
        with:
          repository: kb21-rw/experience-rwanda-backend

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install and Start Backend
        run: |
          yarn install
          yarn dev &
          npx wait-on http://localhost:3000

      - name: Backend Tests
        run: yarn test 

  frontend-tests:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend
        run: npm install

      - name: Start Frontend
        run: |
          npm run dev &
          npx wait-on http://localhost:3000

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          wait-on: http://localhost:3000
          wait-on-timeout: 120
