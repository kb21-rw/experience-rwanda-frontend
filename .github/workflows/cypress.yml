name: Cypress E2E Tests

on:
  push:
    branches:
      - dev
      - stage
      - prod
  pull_request:
    branches:
      - dev
      - stage
      - prod

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      IMAGE_HOSTNAME: i0.wp.com
      IMAGE_HOSTNAME2: nzizasafaris.com
      NEXT_PUBLIC_EMAILJS_SERVICE_ID: service_z4jncuo
      NEXT_PUBLIC_EMAILJS_TEMPLATE_ID: template_3r64g0i
      NEXT_PUBLIC_EMAILJS_PUBLIC_KEY: R4c9ZEUuE1_fHfPFK
      JWT_SECRET: nestor
      REVALIDATION_SECRET: my-strong-secret-key

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@v3

      - name: Use Node.js v20
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Clone Backend Repository
        run: |
          git clone https://x-access-token:${{ secrets.BACKEND_PAT }}@github.com/kb21-rw/experience-rwanda-backend.git backend

      - name: Install Backend Dependencies
        working-directory: backend
        run: yarn

      - name: Start Backend and Wait for Readiness
        working-directory: backend
        run: |
          echo "Starting backend in background..."
          PORT=4000 yarn dev &

          echo "Waiting for backend to be ready (max 120 seconds)..."
          timeout=120
          elapsed=0
          until curl -s http://localhost:4000/api/health >/dev/null; do
            sleep 10
            elapsed=$((elapsed+10))
            echo "Backend is not ready yet... ($elapsed seconds)"
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Backend failed to start within $timeout seconds."
              exit 1
            fi
          done
          echo "Backend is ready!"

      - name: Start Frontend and Wait for Readiness
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api
        run: |
          echo "Starting frontend in background..."
          npm run dev &

          echo "Waiting for frontend to be ready (max 120 seconds)..."
          timeout=120
          elapsed=0
          until curl -s http://localhost:3000 >/dev/null; do
            sleep 10
            elapsed=$((elapsed+10))
            echo "Frontend is not ready yet... ($elapsed seconds)"
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "Frontend failed to start within $timeout seconds."
              exit 1
            fi
          done
          echo "Frontend is ready!"

      - name: Run Cypress Tests
        run: npx cypress run

      - name: Upload Cypress Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
